name: 防止 Actions 自动停止

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    if: github.repository == 'zzstar101/taygedo-auto-attendance'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "chore: keep workflows active [skip ci]"

      - name: Push
        run: |
          git push origin HEAD:main
